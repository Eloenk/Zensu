name: Release Zensu

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows GUI App
        run: |
          wails build -clean

      - name: Run Inno Setup Compiler
        run: |
          iscc installer.iss

      - name: Copy Installer to Final Name
        run: |
          Copy-Item zensu-setup.exe zensu-setup-x64.exe

      - name: Build Windows CLI
        run: |
          go build -ldflags="-s -w" -o zensu-cli-x64.exe ./cmd/

      - name: Build Linux CLI
        run: |
          $env:GOOS="linux"
          $env:GOARCH="amd64"
          go build -ldflags="-s -w" -o zensu-cli-linux-x64 ./cmd/

      - name: Build Android ARM64 CLI
        run: |
          $env:GOOS="android"
          $env:GOARCH="arm64"
          go build -ldflags="-s -w" -o zensu-cli-termux-arm64 ./cmd/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zensu-setup-x64.exe
            zensu-cli-x64.exe
            zensu-cli-linux-x64
            zensu-cli-termux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
